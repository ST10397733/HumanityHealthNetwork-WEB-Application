<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<style>
body {font-family: Arial; background:#f8f8f8; padding:20px;}
h1 {color:#002366;}
table {width:100%; border-collapse:collapse; background:white; margin-top:20px;}
th,td {border:1px solid #ccc; padding:8px;}
th {background:#002366; color:white;}
button {background:crimson; color:white; border:none; padding:10px; margin-top:20px; cursor:pointer;}
</style>
</head>
<body>
<h1>Admin Dashboard</h1>
<p id="summary">Loading...</p>

<h2>Logins</h2>
<table id="logins"><thead><tr><th>Username</th><th>Role</th><th>Email</th><th>Time</th></tr></thead><tbody></tbody></table>

<h2>Actions</h2>
<table id="actions"><thead><tr><th>Name</th><th>Option</th><th>Email</th><th>Amount</th><th>Performed By</th><th>Time</th></tr></thead><tbody></tbody></table>

<button id="logoutBtn">Logout</button>

<script>
if (sessionStorage.getItem('role') !== 'admin') {
  alert('Admins only.');
  window.location.href = 'LOGIN.html';
}

function loadData(){
  const logins = JSON.parse(localStorage.getItem('logins')||'[]');
  const actions = JSON.parse(localStorage.getItem('actions')||'[]');
  document.getElementById('summary').textContent = `Total Logins: ${logins.length} | Total Actions: ${actions.length}`;
  
  const loginRows = logins.map(l=>`<tr><td>${l.username}</td><td>${l.role}</td><td>${l.email||''}</td><td>${l.timestamp}</td></tr>`).join('');
  const actionRows = actions.map(a=>`<tr><td>${a.name}</td><td>${a.option}</td><td>${a.email}</td><td>${a.amount||''}</td><td>${a.performedBy||''}</td><td>${a.timestamp}</td></tr>`).join('');
  document.querySelector('#logins tbody').innerHTML = loginRows;
  document.querySelector('#actions tbody').innerHTML = actionRows;
}

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  sessionStorage.clear();
  window.location.href = 'LOGIN.html';
});

loadData();
</script>
</body>
</html>
